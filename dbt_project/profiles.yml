# dbt profile for NFL QB Personnel Analysis
# This connects dbt to our SQLite database

nfl_qb_personnel:
  target: dev
  outputs:
    dev:
      type: sqlite
      threads: 4
      database: 'nfl_qb_analysis'
      schema: 'main'
      schemas_and_paths:
        main: '/Users/calebsherman/projects/other/nfl-qb-personnell-analysis/data/analytics/nfl_qb_analysis.db'
      schema_directory: '/Users/calebsherman/projects/other/nfl-qb-personnell-analysis/data/analytics'